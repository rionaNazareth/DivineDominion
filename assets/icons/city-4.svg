<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Metropolis: Stepped skyline (5 rectangles) -->
  <!-- Left outer -->
  <rect x="4" y="44" width="10" height="20" fill="#253548" stroke="#3d5568" stroke-width="1.5"/>
  <!-- Left inner -->
  <rect x="14" y="36" width="10" height="28" fill="#253548" stroke="#3d5568" stroke-width="1.5"/>
  <!-- Center tallest -->
  <rect x="24" y="12" width="16" height="52" fill="#2d3f55" stroke="#3d5568" stroke-width="1.5"/>
  <!-- Antenna on tallest -->
  <line x1="32" y1="12" x2="32" y2="4" stroke="#4a5a6a" stroke-width="1"/>
  <!-- Cyan beacon -->
  <circle cx="32" cy="4" r="2" fill="#00CED1" stroke="#40E0D0" stroke-width="1"/>
  <!-- Right inner -->
  <rect x="40" y="36" width="10" height="28" fill="#253548" stroke="#3d5568" stroke-width="1.5"/>
  <!-- Right outer -->
  <rect x="50" y="44" width="10" height="20" fill="#253548" stroke="#3d5568" stroke-width="1.5"/>
  <!-- Window lights: warm and cool mix -->
  <rect x="28" y="20" width="3" height="5" fill="#c9a84c" opacity="0.9"/>
  <rect x="34" y="28" width="3" height="5" fill="#88aacc" opacity="0.9"/>
  <rect x="28" y="38" width="3" height="5" fill="#88aacc" opacity="0.9"/>
  <rect x="34" y="48" width="3" height="5" fill="#c9a84c" opacity="0.9"/>
  <rect x="16" y="42" width="2" height="4" fill="#88aacc" opacity="0.9"/>
  <rect x="46" y="42" width="2" height="4" fill="#c9a84c" opacity="0.9"/>
</svg>
